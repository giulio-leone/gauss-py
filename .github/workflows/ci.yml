name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio hypothesis

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          PYTHONPATH: python

  e2e-test:
    name: E2E Tests (PyO3 Integration)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: gauss-py

      - uses: actions/checkout@v4
        with:
          repository: giulio-leone/gauss-core
          path: gauss-core

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies and build
        working-directory: gauss-py
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install maturin pytest pytest-asyncio
          maturin develop
        continue-on-error: true

      - name: Run E2E tests
        working-directory: gauss-py
        run: |
          source .venv/bin/activate
          python -m pytest tests/e2e/ -v
        if: hashFiles('gauss-py/tests/e2e/') != ''
        continue-on-error: true

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-asyncio pytest-cov hypothesis

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --cov=gauss --cov-report=term-missing --cov-report=html
        env:
          PYTHONPATH: python

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 14

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install ruff mypy

      - name: Ruff check
        run: ruff check python/

      - name: Ruff format check
        run: ruff format --check python/

      - name: Mypy
        run: mypy python/gauss/ --ignore-missing-imports
        continue-on-error: true

  build:
    name: Build (maturin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: gauss-py

      - uses: actions/checkout@v4
        with:
          repository: giulio-leone/gauss-core
          path: gauss-core

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        working-directory: gauss-py
        run: maturin build --release
